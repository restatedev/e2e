name: 'Restate SDK Test Suite'
description: 'Run the Restate SDK Test suite'
inputs:
  envVars:
    required: false
    description: list of vars and values used when running the test tool
  testArtifactOutput:
    required: true
    description: Name of the test artifact output to upload
  restateContainerImage:
    required: false
    description: Container image to use for Restate
    default: 'ghcr.io/restatedev/restate:main'
  serviceContainerImage:
    required: true
    description: Container image to use for the service
  exclusionsFile:
    required: false
    description: Exclusions file
  customTestsFile:
    required: false
    description: Custom tests file
  serviceContainerEnvFile:
    required: false
    description: Service container env file
  testSuite:
    required: false
    description: Test suite to run (default, threeNodes, alwaysSuspending, threeNodesAlwaysSuspending, singleThreadSinglePartition, lazyState, lazyStateAlwaysSuspending, persistedTimers). Runs all suites if omitted.
  testName:
    required: false
    description: Name of a single test class to run within the suite (requires testSuite)
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Download tool
      env:
        # https://github.com/orgs/community/discussions/49245
        GH_ACTION_REF: ${{ github.action_ref || github.ref_name }}
      shell: bash
      run: wget --no-verbose https://github.com/restatedev/e2e/releases/download/$GH_ACTION_REF/sdk-tests.jar

    - name: Set environment variables
      if: ${{ inputs.envVars }}
      shell: bash
      run: |
        for env in "${{ inputs.envVars }}"
        do
          printf "%s\n" $env >> $GITHUB_ENV
        done

    - name: Run test suite
      env:
        RESTATE_CONTAINER_IMAGE: ${{ inputs.restateContainerImage }}
      shell: bash
      run: java -jar sdk-tests.jar run ${{ inputs.testSuite != '' && format('--test-suite={0}', inputs.testSuite) || '' }} ${{ inputs.testName != '' && format('--test-name={0}', inputs.testName) || '' }} ${{ inputs.exclusionsFile != '' && format('--exclusions-file={0}', inputs.exclusionsFile) || '' }} ${{ inputs.serviceContainerEnvFile != '' && format('--service-container-env-file={0}', inputs.serviceContainerEnvFile) || '' }} ${{ inputs.customTestsFile != '' && format('--custom-tests-file={0}', inputs.customTestsFile) || '' }} --report-dir=test-report ${{ inputs.serviceContainerImage }}

    # Upload logs and publish test result
    - uses: actions/upload-artifact@v4
      if: always() # Make sure this is run even when test fails
      with:
        name: ${{ inputs.testArtifactOutput }}
        path: test-report
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          test-report/*/*.xml
